<!DOCTYPE html>
<html>

<head>

    <title>Blood Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-danger p-3">

    <div class="container">

        <h2 class="text-white">
            Blood Request System
        </h2>

        <a href="/dashboard" class="btn btn-light">
            Dashboard
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow p-5">

                <h2 class="text-center text-danger mb-4">
                    Blood Request Form
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Patient Name
                        </label>

                        <input type="text"
                               name="patient_name"
                               class="form-control"
                               placeholder="Enter Patient Name"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Blood Group Needed
                        </label>

                        <select name="blood_group"
                                class="form-control"
                                required>

                            <option value="">
                                Select Blood Group
                            </option>

                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Hospital Name
                        </label>

                        <input type="text"
                               name="hospital"
                               class="form-control"
                               placeholder="Enter Hospital Name"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            City
                        </label>

                        <input type="text"
                               name="city"
                               class="form-control"
                               placeholder="Enter City"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Contact Number
                        </label>

                        <input type="text"
                               name="contact"
                               class="form-control"
                               placeholder="Enter Contact Number"
                               required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Urgency Level
                        </label>

                        <select name="urgency"
                                class="form-control"
                                required>

                            <option value="">
                                Select Urgency
                            </option>

                            <option>Normal</option>
                            <option>Urgent</option>
                            <option>Critical</option>

                        </select>

                    </div>

                    <button class="btn btn-danger w-100">
                        Submit Blood Request
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
